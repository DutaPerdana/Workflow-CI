# .github/workflows/main.yml
name: Kriteria 3 CI Setup

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  train_model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      # 1. Setup Python Environment
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # 2. Instal MLflow dan Dependencies
      - name: Install Dependencies
        run: |
          pip install mlflow
          pip install -r MLproject/requirements.txt || true # Atau gunakan conda.yaml jika perlu
          
      # 3. Jalankan MLflow Project (Re-training)
      - name: Run MLflow Project and Train Model
        run: |
          # Perintah ini menjalankan modelling.py dengan parameter default dari MLproject
          mlflow run ./MLproject --env-manager=local

      # 4. [SKILLED REQUIREMENT] Simpan Artefak mlruns/ ke Repository GitHub
      - name: Commit MLflow Artifacts (mlruns)
        run: |
          # Konfigurasi Git Identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan folder mlruns/
          git add mlruns/
          
          # Commit jika ada perubahan
          git commit -m "CI: Kriteria 3 Skilled - Save MLflow artifacts (mlruns)" || true
          
          # Push perubahan (artefak) ke branch main
          git push