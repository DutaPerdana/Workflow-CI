# .github/workflows/main.yml
name: MLflow CI/CD Pipeline - Retraining

on:
  # Trigger workflow ini setiap kali ada push ke branch 'main'
  push:
    branches: [ "main" ]
  # Atau trigger secara manual
  workflow_dispatch:

jobs:
  train_model:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode repository
      - uses: actions/checkout@v4
      
      # 2. Setup Python Environment
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          cache: 'pip' # Mempercepat instalasi

      # 3. Instal MLflow dan Dependencies
      - name: Install Dependencies
        run: |
          pip install mlflow
          pip install -r MLproject/requirements.txt || true # Instal jika ada requirements.txt tambahan
          
      # 4. Jalankan MLflow Project (Re-training)
      # Ini akan membaca MLproject/MLproject dan menggunakan MLproject/conda.yaml
      # Artefak (mlruns) akan tersimpan secara lokal di runner
      - name: Run MLflow Project and Train Model
        run: |
          mlflow run ./MLproject --env-manager=local

      # 5. [SKILLED REQUIREMENT] Simpan Artefak mlruns/ ke Repository GitHub
      # Langkah ini menggunakan token GITHUB_TOKEN bawaan untuk commit.
      - name: Commit MLflow Artifacts (mlruns)
        run: |
          # Konfigurasi Git Identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan folder mlruns ke staging
          git add mlruns/
          
          # Commit jika ada perubahan (|| true untuk mencegah gagal jika tidak ada perubahan)
          git commit -m "CI: Save MLflow artifacts after retraining job" || true
          
          # Push perubahan (artefak) ke branch main
          git push